<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaKIT - 설정 | Human.Ai.D</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/img/illustrations/login-mark.svg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/app-shell.css">
    <style>
        body { background: var(--mk-color-bg-subtle, #fafafa); min-height: 100vh; font-family: var(--mk-font-sans); }
        .settings-wrap { max-width: 720px; margin: 0 auto; padding: var(--mk-space-8, 32px) var(--mk-space-6, 24px); }
        .settings-wrap h1 { font-size: var(--mk-font-size-3xl); margin: 0 0 var(--mk-space-2); }
        .settings-wrap > p { color: var(--mk-color-text-muted); margin: 0 0 var(--mk-space-6, 24px); }
        .set-card {
            background: var(--mk-color-bg);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-lg);
            padding: var(--mk-space-6, 24px);
            margin-bottom: var(--mk-space-4, 16px);
        }
        .set-card h2 {
            margin: 0 0 var(--mk-space-4, 16px);
            font-size: var(--mk-font-size-lg);
            font-weight: var(--mk-font-weight-semibold);
            color: var(--mk-color-text);
        }
        .set-card label { display: block; margin-bottom: 4px; font-size: var(--mk-font-size-sm); font-weight: 500; color: var(--mk-color-text); }
        .set-card input[type="text"], .set-card input[type="email"], .set-card input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--mk-color-bg);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-md);
            font: inherit;
            font-size: var(--mk-font-size-base);
            margin-bottom: var(--mk-space-3, 12px);
            color: var(--mk-color-text);
        }
        .set-card input:focus { outline: none; border-color: var(--mk-color-brand-500); box-shadow: 0 0 0 3px rgb(37 99 235 / 0.15); }
        .set-actions { display: flex; gap: var(--mk-space-2); margin-top: var(--mk-space-3); }
        .btn-primary { padding: 10px 18px; background: var(--mk-color-brand-500); color: var(--mk-color-text-on-brand); border: none; border-radius: var(--mk-radius-md); font-weight: 500; cursor: pointer; transition: background var(--mk-duration-fast) ease; }
        .btn-primary:hover:not(:disabled) { background: var(--mk-color-brand-600); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg-success { color: var(--mk-color-success-text); padding: 8px 12px; background: var(--mk-color-success-bg); border-radius: var(--mk-radius-sm); font-size: var(--mk-font-size-sm); }
        .msg-error { color: var(--mk-color-error-text); padding: 8px 12px; background: var(--mk-color-error-bg); border-radius: var(--mk-radius-sm); font-size: var(--mk-font-size-sm); }
        .theme-options { display: flex; gap: var(--mk-space-2); }
        .theme-opt {
            flex: 1;
            padding: var(--mk-space-3) var(--mk-space-4);
            background: var(--mk-color-bg);
            border: 2px solid var(--mk-color-border);
            border-radius: var(--mk-radius-md);
            cursor: pointer;
            text-align: center;
            font: inherit;
            font-size: var(--mk-font-size-sm);
            color: var(--mk-color-text);
            transition: all var(--mk-duration-fast) ease;
        }
        .theme-opt:hover { border-color: var(--mk-color-border-strong); }
        .theme-opt.active { border-color: var(--mk-color-brand-500); background: var(--mk-color-brand-50); color: var(--mk-color-brand-500); font-weight: 500; }
        .motion-setting { margin-top: var(--mk-space-4, 16px); padding-top: var(--mk-space-4, 16px); border-top: 1px solid var(--mk-color-border); }
        .motion-setting label { display: flex; align-items: center; gap: var(--mk-space-2, 8px); cursor: pointer; font-weight: 500; }
        .motion-setting input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .motion-setting small { display: block; margin-top: 8px; font-size: var(--mk-font-size-xs); color: var(--mk-color-text-muted); }
    </style>
</head>
<body>
    <a href="#main-content" class="mk-skip-link">메인 콘텐츠로 건너뛰기</a>
    <noscript><div class="makit-noscript">JavaScript가 필요합니다.</div></noscript>

    <nav class="top-nav" aria-label="페이지 네비게이션">
        <div class="top-nav-container">
            <a href="index.html" class="nav-back">
                <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
                대시보드
            </a>
        </div>
    </nav>

    <main id="main-content" class="settings-wrap">
        <h1>설정</h1>
        <p>프로필 · 비밀번호 · 화면 테마를 관리할 수 있습니다.</p>

        <section class="set-card">
            <h2 data-i18n="settings.profile">프로필</h2>
            <form id="profileForm" novalidate>
                <label for="profName" data-i18n="auth.name">이름</label>
                <input type="text" id="profName" name="name" required>
                <label for="profEmail" data-i18n="auth.email">이메일</label>
                <input type="email" id="profEmail" name="email" required>
                <div class="set-actions">
                    <button type="submit" class="btn-primary" id="profSaveBtn" data-i18n="common.save">저장</button>
                </div>
                <div id="profMessage" role="status" aria-live="polite" style="margin-top:12px;"></div>
            </form>
        </section>

        <section class="set-card">
            <h2 data-i18n="settings.password">비밀번호 변경</h2>
            <form id="pwForm" novalidate>
                <label for="pwOld" data-i18n="settings.current-password">현재 비밀번호</label>
                <input type="password" id="pwOld" name="oldPassword" required minlength="6" autocomplete="current-password">
                <label for="pwNew" data-i18n="settings.new-password">새 비밀번호 (6자 이상)</label>
                <input type="password" id="pwNew" name="newPassword" required minlength="6" autocomplete="new-password">
                <label for="pwNewConfirm" data-i18n="settings.confirm-password">새 비밀번호 확인</label>
                <input type="password" id="pwNewConfirm" required minlength="6" autocomplete="new-password">
                <div class="set-actions">
                    <button type="submit" class="btn-primary" id="pwSaveBtn" data-i18n="settings.password">비밀번호 변경</button>
                </div>
                <div id="pwMessage" role="status" aria-live="polite" style="margin-top:12px;"></div>
            </form>
        </section>

        <section class="set-card">
            <h2 data-i18n="settings.theme">화면 테마</h2>
            <div class="theme-options" role="radiogroup" aria-label="테마 선택">
                <button type="button" class="theme-opt" data-theme="auto" role="radio" data-i18n="settings.theme-auto">시스템 자동</button>
                <button type="button" class="theme-opt" data-theme="light" role="radio" data-i18n="settings.theme-light">라이트</button>
                <button type="button" class="theme-opt" data-theme="dark" role="radio" data-i18n="settings.theme-dark">다크</button>
            </div>
            <div class="motion-setting">
                <label for="reduceMotionCheck" data-i18n="settings.motion">
                    <input type="checkbox" id="reduceMotionCheck" name="reduceMotion">
                    애니메이션 줄이기
                </label>
                <small>시스템 접근성 설정을 따라 모션 효과를 최소화합니다.</small>
            </div>
        </section>

        <section class="set-card" id="pushNotificationCard" style="display:none;">
            <h2>푸시 알림</h2>
            <p id="pushStatus" style="font-size: var(--mk-font-size-sm); color: var(--mk-color-text-muted); margin-bottom: var(--mk-space-3);">확인 중...</p>
            <div class="set-actions">
                <button type="button" class="btn-primary" id="pushToggleBtn">활성화</button>
                <button type="button" class="btn-primary" id="pushTestBtn" style="display:none;">테스트 알림 전송</button>
            </div>
            <div id="pushMessage" role="status" aria-live="polite" style="margin-top:12px;"></div>
        </section>

        <section class="set-card" id="pushAnalyticsCard" style="display:none;">
            <h2>푸시 통계 (7일)</h2>
            <div id="analyticsGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--mk-space-3, 12px); margin-bottom: var(--mk-space-4, 16px);">
                <div style="padding: var(--mk-space-3, 12px); background: var(--mk-color-bg-subtle); border-radius: var(--mk-radius-md); text-align: center;">
                    <div style="font-size: var(--mk-font-size-sm); color: var(--mk-color-text-muted); margin-bottom: 4px;">전송</div>
                    <div id="analyticsSent" style="font-size: var(--mk-font-size-2xl); font-weight: 600; color: var(--mk-color-brand-500);">-</div>
                </div>
                <div style="padding: var(--mk-space-3, 12px); background: var(--mk-color-bg-subtle); border-radius: var(--mk-radius-md); text-align: center;">
                    <div style="font-size: var(--mk-font-size-sm); color: var(--mk-color-text-muted); margin-bottom: 4px;">클릭</div>
                    <div id="analyticsClicked" style="font-size: var(--mk-font-size-2xl); font-weight: 600; color: var(--mk-color-success-500);">-</div>
                </div>
                <div style="padding: var(--mk-space-3, 12px); background: var(--mk-color-bg-subtle); border-radius: var(--mk-radius-md); text-align: center;">
                    <div style="font-size: var(--mk-font-size-sm); color: var(--mk-color-text-muted); margin-bottom: 4px;">실패</div>
                    <div id="analyticsFailed" style="font-size: var(--mk-font-size-2xl); font-weight: 600; color: var(--mk-color-error-500);">-</div>
                </div>
                <div style="padding: var(--mk-space-3, 12px); background: var(--mk-color-bg-subtle); border-radius: var(--mk-radius-md); text-align: center;">
                    <div style="font-size: var(--mk-font-size-sm); color: var(--mk-color-text-muted); margin-bottom: 4px;">클릭률</div>
                    <div id="analyticsCtr" style="font-size: var(--mk-font-size-2xl); font-weight: 600; color: var(--mk-color-brand-400);">-%</div>
                </div>
            </div>
            <div style="margin-top: var(--mk-space-4, 16px); padding-top: var(--mk-space-4, 16px); border-top: 1px solid var(--mk-color-border);">
                <canvas id="pushAnalyticsChart" style="max-height: 200px;"></canvas>
            </div>
            <div id="analyticsMessage" role="status" aria-live="polite" style="margin-top:12px;"></div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/pages/chatbot.js"></script>
    <script src="js/chatbot-widget.js"></script>
    <script src="js/user-menu.js"></script>
    <script src="js/i18n-dict.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app-shell-extras.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="js/ws-client.js"></script>
    <script src="js/push-subscribe.js"></script>
    <script src="js/pages/settings.js"></script>
    <script src="js/sw-register.js"></script>
    <script src="js/skeleton.js"></script>
</body>
</html>
