<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX Office Hub | MaKIT</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#c96442">
    <meta name="description" content="AX Office Hub — 팀의 모든 지식을 AI로 연결. 컬렉션·문서·메모·일정·RAG 챗을 한 화면에서.">
    <link rel="apple-touch-icon" href="/img/illustrations/login-mark.svg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="css/core/tokens.css">
    <link rel="stylesheet" href="css/core/common.css">
    <link rel="stylesheet" href="css/core/app-shell.css">
    <link rel="stylesheet" href="css/pages/ax-office-hub.css">
</head>
<body data-page="ax-office-hub">
    <a href="#main-content" class="mk-skip-link">메인 콘텐츠로 건너뛰기</a>
    <noscript><div class="makit-noscript">이 페이지는 JavaScript가 필요합니다.</div></noscript>

    <nav class="top-nav" aria-label="페이지 네비게이션">
        <div class="top-nav-container">
            <div class="nav-logo">
                <button type="button" class="hub-mobile-toggle" id="hubMobileToggle" aria-label="사이드바 열기" aria-controls="hubSidebar" aria-expanded="false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <a href="all-services.html" class="logo-text" style="text-decoration:none;color:inherit;">MaKIT</a>
                <span class="hub-crumb" aria-hidden="true">›</span>
                <span class="hub-name">AX Office Hub</span>
            </div>
            <div class="nav-links">
                <a href="all-services.html" class="nav-link">백오피스</a>
                <a href="index.html" class="nav-link">홈</a>
                <button type="button" class="nav-alert-btn" id="navAlertBtn" aria-label="알림" title="알림"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg></button>
                <button type="button" class="nav-settings-btn" id="navSettingsBtn" aria-label="메뉴" aria-haspopup="true" aria-expanded="false" title="메뉴"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            </div>
        </div>
    </nav>

    <div class="hub-container app-container-no-sidebar">
        <!-- Hub-internal sidebar (Kynapse-style) -->
        <div class="hub-sidebar-backdrop" id="hubSidebarBackdrop" hidden></div>
        <aside class="hub-sidebar" id="hubSidebar" aria-label="Office Hub 내비게이션">
            <div class="hub-side-section">
                <button type="button" class="hub-side-search" id="hubSideSearchBtn" aria-label="전체 검색">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                    <span>검색</span>
                    <kbd>⌘K</kbd>
                </button>
            </div>

            <nav class="hub-side-nav" aria-label="주요 메뉴">
                <a href="#home" class="hub-side-item" data-route="home">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
                    <span>홈</span>
                </a>
                <a href="#trash" class="hub-side-item" data-route="trash">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
                    <span>임시 보관함</span>
                </a>
                <a href="#mine" class="hub-side-item" data-route="mine">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h10M4 17h16"/></svg>
                    <span>내 컬렉션</span>
                </a>
                <a href="#favorites" class="hub-side-item" data-route="favorites">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 2 3 7h7l-5.5 4.2L18.5 21 12 16.7 5.5 21l2-7.8L2 9h7z"/></svg>
                    <span>즐겨찾기</span>
                </a>
            </nav>

            <div class="hub-side-section hub-side-collections">
                <div class="hub-side-section-head">
                    <span>컬렉션</span>
                    <button type="button" class="hub-side-add" id="hubAddCollectionBtn" aria-label="컬렉션 추가" title="컬렉션 추가">+</button>
                </div>
                <div class="hub-side-collection-list" id="hubCollectionList"><!-- JS populated --></div>
            </div>
        </aside>

        <main id="main-content" class="hub-main" role="main">
            <div class="hub-view" id="hubView" aria-live="polite"><!-- JS populated --></div>
        </main>
    </div>

    <div id="chatbot-widget-mount"></div>
    <div id="user-menu-mount"></div>

    <!-- Hub global search modal -->
    <div class="hub-search-modal" id="hubSearchModal" hidden role="dialog" aria-modal="true" aria-label="전체 검색">
        <div class="hub-search-backdrop" data-close></div>
        <div class="hub-search-panel">
            <div class="hub-search-input-row">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="search" id="hubSearchInput" placeholder="문서·메모·태그 검색…" autocomplete="off">
                <button type="button" class="hub-search-close" data-close aria-label="닫기">✕</button>
            </div>
            <div class="hub-search-results" id="hubSearchResults"></div>
        </div>
    </div>

    <script src="js/core/config.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/ui.js"></script>
    <script src="js/widgets/chatbot-widget.js"></script>
    <script src="js/widgets/user-menu.js"></script>
    <script src="js/core/i18n-dict.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/widgets/app-shell-extras.js"></script>
    <script src="js/widgets/settings-menu.js"></script>
    <script src="js/core/modal.js"></script>
    <script src="js/widgets/auth-gate.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="js/pages/ax-office-hub.js"></script>
    <script src="js/core/sw-register.js"></script>
</body>
</html>
