<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaKIT 로그인 | Human.Ai.D</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 0.3rem;
        }

        .logo p {
            color: #888;
            font-size: 0.85rem;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e1e5e9;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.65rem;
            background: none;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color 0.2s, border-color 0.2s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e9;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            background: #5a6fd8;
        }

        .submit-btn:active {
            transform: scale(0.99);
        }

        .submit-btn:disabled {
            background: #c5c9f0;
            cursor: not-allowed;
            transform: none;
        }

        .demo-accounts {
            margin-top: 1.5rem;
            padding: 0.9rem 1rem;
            background: #f4f5ff;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .demo-accounts h3 {
            color: #444;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .demo-account {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
            font-size: 0.82rem;
            color: #555;
        }

        .demo-account:last-child {
            margin-bottom: 0;
        }

        .demo-fill-btn {
            background: none;
            border: 1px solid #667eea;
            color: #667eea;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            margin-left: auto;
            transition: background 0.15s, color 0.15s;
        }

        .demo-fill-btn:hover {
            background: #667eea;
            color: white;
        }

        .message-area {
            min-height: 1.5rem;
            margin-top: 0.8rem;
            text-align: center;
            font-size: 0.88rem;
        }

        .msg-error { color: #e74c3c; }
        .msg-success { color: #27ae60; }

        .spinner-wrap {
            display: none;
            text-align: center;
            margin-top: 0.6rem;
        }

        .spinner {
            border: 2px solid #e0e0e0;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 0.4rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <noscript><div class="makit-noscript">이 페이지는 JavaScript가 필요합니다.</div></noscript>
    <div class="login-container">
        <div class="logo">
            <h1>MaKIT</h1>
            <p>AI 마케팅 플랫폼 | Human.Ai.D</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">로그인</button>
            <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">회원가입</button>
        </div>

        <!-- 로그인 패널 -->
        <div class="tab-panel active" id="panelLogin">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">로그인</button>
            </form>
            <div class="spinner-wrap" id="loginSpinner">
                <span class="spinner"></span> 로그인 중...
            </div>
            <div class="message-area" id="loginMessage"></div>

            <div class="demo-accounts">
                <h3>🚀 데모 계정으로 바로 체험</h3>
                <div class="demo-account">
                    <span><strong>관리자</strong> — demo@Human.Ai.D.com</span>
                    <button class="demo-fill-btn" onclick="fillDemo('demo@Human.Ai.D.com','password123')">사용하기</button>
                </div>
                <div class="demo-account">
                    <span><strong>마케터</strong> — marketer@example.com</span>
                    <button class="demo-fill-btn" onclick="fillDemo('marketer@example.com','password123')">사용하기</button>
                </div>
            </div>
        </div>

        <!-- 회원가입 패널 -->
        <div class="tab-panel" id="panelRegister">
            <form id="registerForm">
                <div class="form-group">
                    <label for="regName">이름</label>
                    <input type="text" id="regName" name="name" placeholder="이름을 입력하세요" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="regEmail">이메일</label>
                    <input type="email" id="regEmail" name="email" placeholder="이메일을 입력하세요" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="regPassword">비밀번호</label>
                    <input type="password" id="regPassword" name="password" placeholder="6자 이상 입력하세요" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="regPasswordConfirm">비밀번호 확인</label>
                    <input type="password" id="regPasswordConfirm" name="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" required autocomplete="new-password">
                </div>
                <button type="submit" class="submit-btn" id="registerBtn">가입하기</button>
            </form>
            <div class="spinner-wrap" id="registerSpinner">
                <span class="spinner"></span> 가입 처리 중...
            </div>
            <div class="message-area" id="registerMessage"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/pages/login.js"></script>
    <script>
        function switchTab(tab) {
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
            document.getElementById('panelRegister').classList.toggle('active', tab === 'register');
        }

        function fillDemo(email, password) {
            var e = document.getElementById('email');
            var p = document.getElementById('password');
            if (e) e.value = email;
            if (p) p.value = password;
        }

        // Legacy global used by old onclick attributes
        window.fillDemoAccount = fillDemo;
    </script>
</body>
</html>
