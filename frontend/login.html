    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--mk-font-sans);
            background:
                radial-gradient(circle at 15% 10%, rgba(201, 100, 66, 0.12) 0%, transparent 55%),
                radial-gradient(circle at 85% 90%, rgba(217, 138, 108, 0.10) 0%, transparent 55%),
                var(--mk-color-bg, #faf9f5);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--mk-color-text);
        }
        .login-container {
            background: var(--mk-color-bg-subtle);
            padding: 2.5rem;
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-xl, 20px);
            box-shadow: var(--mk-shadow-lg);
            width: 100%;
            max-width: 420px;
            margin: auto;
        }
        .logo { text-align: center; margin-bottom: 1.75rem; display: flex; flex-direction: column; align-items: center; gap: 0.625rem; }
        .logo img { width: 48px; height: 48px; }
        .logo h1 { font-size: 1.625rem; font-weight: 700; color: var(--mk-color-text); margin: 0; letter-spacing: -0.02em; }
        .logo p { color: var(--mk-color-text-muted); font-size: 0.85rem; margin: 0; }
        .tab-selector { display: flex; border-bottom: 1px solid var(--mk-color-border); margin-bottom: 1.5rem; gap: 0.5rem; }
        .tab-selector button { flex: 1; padding: 0.75rem; background: none; border: none; cursor: pointer; font-size: 0.9375rem; font-weight: 600; color: var(--mk-color-text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.2s ease, border-color 0.2s ease; font-family: inherit; }
        .tab-selector button:hover { color: var(--mk-color-text); }
        .tab-selector button.active { color: var(--mk-color-brand-500); border-bottom-color: var(--mk-color-brand-500); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4375rem; font-size: 0.875rem; font-weight: 600; color: var(--mk-color-text); }
        .form-group input { width: 100%; padding: 0.6875rem 0.875rem; border: 1px solid var(--mk-color-border); background: var(--mk-color-bg); color: var(--mk-color-text); border-radius: var(--mk-radius-md, 10px); font-size: 0.9375rem; font-family: inherit; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .form-group input::placeholder { color: var(--mk-color-text-faint); }
        .form-group input:focus { outline: none; border-color: var(--mk-color-brand-500); box-shadow: var(--mk-shadow-focus, 0 0 0 3px rgba(201, 100, 66, 0.18)); }
        .password-input-wrapper { position: relative; display: flex; align-items: center; }
        .password-input-wrapper input { flex: 1; padding-right: 2.5rem; }
        .password-toggle { position: absolute; right: 0.5rem; background: none; border: none; cursor: pointer; padding: 0.5rem; color: var(--mk-color-text-muted); border-radius: var(--mk-radius-sm); }
        .password-toggle:hover { color: var(--mk-color-brand-500); }
        .strength-bar { width: 100%; height: 4px; background: var(--mk-color-border); border-radius: 2px; margin: 0.375rem 0 0.5rem; overflow: hidden; }
        .strength-bar span { display: block; height: 100%; background: var(--mk-color-text-muted); border-radius: 2px; transition: width 0.3s ease, background 0.3s ease; }
        .strength-bar.strength-weak span { background: #ef4444; }
        .strength-bar.strength-medium span { background: #eab308; }
        .strength-bar.strength-strong span { background: #10b981; }
        .strength-label { font-size: 0.75rem; color: var(--mk-color-text-muted); }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin: 1rem 0; }
        .checkbox-group input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--mk-color-brand-500); }
        .checkbox-group label { margin: 0; font-weight: 400; cursor: pointer; flex: 1; font-size: 0.875rem; color: var(--mk-color-text); }
        .terms-label { font-size: 0.8125rem; color: var(--mk-color-text-muted); }
        .terms-label a { color: var(--mk-color-brand-500); text-decoration: none; }
        .terms-label a:hover { text-decoration: underline; }
        .link-secondary { text-align: center; margin-top: 1rem; font-size: 0.875rem; }
        .link-secondary a { color: var(--mk-color-brand-500); text-decoration: none; font-weight: 500; }
        .link-secondary a:hover { text-decoration: underline; }
        .submit-button { width: 100%; padding: 0.75rem; background: var(--mk-color-brand-500); color: #fff; border: 1px solid var(--mk-color-brand-500); border-radius: var(--mk-radius-md, 10px); font-size: 0.9375rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease; margin-top: 1rem; position: relative; }
        .submit-button:hover:not(:disabled) { background: var(--mk-color-brand-600); border-color: var(--mk-color-brand-600); box-shadow: var(--mk-shadow-md); }
        .submit-button:active:not(:disabled) { transform: translateY(1px); }
        .submit-button:disabled { opacity: 0.6; cursor: not-allowed; }
        .submit-button:focus-visible { outline: 2px solid var(--mk-color-brand-500); outline-offset: 2px; }
        .spinner { display: none; position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border: 2px solid rgba(255, 255, 255, 0.35); border-radius: 50%; border-top-color: #fff; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 1.5s; } }
        .message-area { min-height: 22px; margin-bottom: 0.75rem; font-size: 0.875rem; }
        .msg-success { color: #10b981; }
        .msg-error { color: #ef4444; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        @media (max-width: 640px) {
            .login-container { padding: 1.75rem 1.25rem; border-radius: var(--mk-radius-lg, 16px); }
            .logo h1 { font-size: 1.5rem; }
        }
    </style>

<body>
    <a href="#main-content" class="mk-skip-link">메인 콘텐츠로 건너뛰기</a>

    <nav class="top-nav" aria-label="페이지 네비게이션">
          <div class="top-nav-container">
              <div class="nav-logo"><div class="logo-text">MaKIT</div></div>
              <div class="nav-links">
                  <a href="intro.html" class="nav-link">제품 소개</a>
                  <a href="all-services.html" class="nav-link">서비스 체험</a>
                  <a href="index.html" class="nav-link">플랫폼</a>
                  <a href="login.html" class="nav-link nav-link-cta active" aria-current="page">로그인</a>
              </div>
          </div>
      </nav>
    <main class="login-container" id="main-content" role="main">
        <div class="logo">
            <img src="img/illustrations/login-mark.svg" alt="MaKIT Logo">
            <h1>MaKIT</h1>
            <p>AI 마케팅 플랫폼</p>
        </div>

        <div class="tab-selector" role="tablist" aria-label="인증 모드 선택">
            <button class="active" role="tab" aria-selected="true" aria-controls="login-pane" id="tab-login" onclick="switchTab(event, 'login')" data-i18n="auth.login">로그인</button>
            <button role="tab" aria-selected="false" aria-controls="register-pane" id="tab-register" onclick="switchTab(event, 'register')" data-i18n="auth.register">회원가입</button>
        </div>

        <div id="login-pane" class="tab-pane active" role="tabpanel" aria-labelledby="tab-login">
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="loginEmail" data-i18n="auth.email">이메일</label>
                    <input type="email" id="loginEmail" name="email" data-i18n-attr="placeholder:auth.email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword" data-i18n="auth.password">비밀번호</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="loginPassword" name="password" placeholder="6자 이상" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPassword')" aria-label="비밀번호 표시/숨김" aria-pressed="false">
                            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe" checked>
                    <label for="rememberMe" data-i18n="auth.remember">로그인 상태 유지</label>
                </div>

                <div class="link-secondary">
                    <a href="#" id="forgotPasswordLink" data-i18n="auth.forgot">비밀번호 찾기</a>
                </div>

                <div class="message-area" id="loginMessage" role="status" aria-live="polite"></div>

                <button type="button" class="submit-button" id="loginBtn" onclick="doLogin()" data-i18n="auth.submit-login">
                    로그인
                    <div class="spinner" id="loginSpinner"></div>
                </button>
            </form>
        </div>

        <div id="register-pane" class="tab-pane" role="tabpanel" aria-labelledby="tab-register">
            <form id="registerForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="regName" data-i18n="auth.name">이름</label>
                    <input type="text" id="regName" name="name" data-i18n-attr="placeholder:auth.name" placeholder="홍길동" required>
                </div>

                <div class="form-group">
                    <label for="regEmail" data-i18n="auth.email">이메일</label>
                    <input type="email" id="regEmail" name="email" data-i18n-attr="placeholder:auth.email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="regPassword" data-i18n="auth.password">비밀번호</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="regPassword" name="password" placeholder="6자 이상" required oninput="renderPasswordStrength()">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('regPassword')" aria-label="비밀번호 표시/숨김" aria-pressed="false">
                            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                    <div id="regPasswordStrength"></div>
                </div>

                <div class="form-group">
                    <label for="regPasswordConfirm" data-i18n="auth.password-confirm">비밀번호 확인</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="regPasswordConfirm" name="passwordConfirm" data-i18n-attr="placeholder:auth.password-confirm" placeholder="비밀번호 재입력" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('regPasswordConfirm')" aria-label="비밀번호 확인 표시/숨김" aria-pressed="false">
                            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms" class="terms-label" data-i18n="auth.terms">
                        <a href="#">이용약관</a> 및 <a href="#">개인정보 처리방침</a>에 동의합니다
                    </label>
                </div>

                <div class="message-area" id="regMessage" role="status" aria-live="polite"></div>

                <button type="button" class="submit-button" id="regBtn" onclick="doRegister()" data-i18n="auth.submit-register">
                    회원가입
                    <div class="spinner" id="regSpinner"></div>
                </button>
            </form>
        </div>
    </main>

    <script src="js/core/config.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/ui.js"></script>
    <script src="js/core/i18n-dict.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/pages/login.js"></script>

    <script>
        function switchTab(evt, tab) {
            // 호환: switchTab('login')처럼 한 인자로만 부르는 옛 호출도 허용
            if (typeof evt === 'string' && tab === undefined) { tab = evt; evt = null; }
            document.querySelectorAll('.tab-pane').forEach(function (el) { el.classList.remove('active'); });
            document.querySelectorAll('.tab-selector button').forEach(function (el) {
                el.classList.remove('active');
                el.setAttribute('aria-selected', 'false');
            });
            var pane = document.getElementById(tab + '-pane');
            if (pane) pane.classList.add('active');
            var targetBtn = (evt && (evt.currentTarget || evt.target)) || document.getElementById('tab-' + tab);
            if (targetBtn) {
                targetBtn.classList.add('active');
                targetBtn.setAttribute('aria-selected', 'true');
            }
            var lm = document.getElementById('loginMessage'); if (lm) lm.innerHTML = '';
            var rm = document.getElementById('regMessage'); if (rm) rm.innerHTML = '';
        }
        window.switchTab = switchTab;
        function togglePasswordVisibility(inputId) {
            var input = document.getElementById(inputId);
            if (!input) return;
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        function renderPasswordStrength() {
            var pw = document.getElementById('regPassword').value;
            var box = document.getElementById('regPasswordStrength');
            if (!box) return;
            if (!pw) { box.innerHTML = ''; return; }
            var score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            score = Math.min(4, score);
            var labels = ['매우 약함', '약함', '보통', '강함', '매우 강함'];
            var levels = ['weak', 'weak', 'medium', 'strong', 'strong'];
            box.innerHTML = '<div class="strength-bar strength-' + levels[score] + '"><span style="width:' + ((score / 4) * 100) + '%"></span></div><small class="strength-label">비밀번호 강도: <strong>' + labels[score] + '</strong></small>';
        }
    </script>
    <script src="js/core/sw-register.js"></script>
    <script src="js/widgets/skeleton.js"></script>
</body>
