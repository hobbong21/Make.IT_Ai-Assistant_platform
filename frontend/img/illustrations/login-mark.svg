<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="loginMarkTitle loginMarkDesc">
  <title id="loginMarkTitle">안전한 로그인</title>
  <desc id="loginMarkDesc">방패와 자물쇠 형태가 결합된 친근한 보안 마크</desc>
  <defs>
    <linearGradient id="loginShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- soft halo -->
  <circle cx="100" cy="100" r="92" fill="#eff6ff"/>

  <!-- shield body (rounded) -->
  <path d="M100 36
           C 100 36, 60 44, 50 56
           L 50 110
           C 50 142, 78 158, 100 168
           C 122 158, 150 142, 150 110
           L 150 56
           C 140 44, 100 36, 100 36 Z"
        fill="url(#loginShield)"/>

  <!-- inner soft area -->
  <path d="M100 52
           C 100 52, 70 58, 64 66
           L 64 108
           C 64 132, 84 144, 100 152
           C 116 144, 136 132, 136 108
           L 136 66
           C 130 58, 100 52, 100 52 Z"
        fill="#ffffff" opacity="0.12"/>

  <!-- check mark (welcome / safe) -->
  <path d="M78 102 L92 116 L124 84"
        stroke="#ffffff" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- subtle sparkle accents -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="60" cy="80" r="2.5"/>
    <circle cx="142" cy="74" r="2"/>
    <circle cx="148" cy="124" r="2.2"/>
    <circle cx="58" cy="130" r="2"/>
  </g>
</svg>
