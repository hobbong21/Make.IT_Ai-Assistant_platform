<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-labelledby="svcDetailTitle svcDetailDesc">
  <title id="svcDetailTitle">자연어 분석 — 텍스트에서 인사이트로</title>
  <desc id="svcDetailDesc">대화 버블이 차트와 키워드 인사이트로 변환되는 자연어 분석 흐름</desc>
  <defs>
    <linearGradient id="svcDetailBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="svcArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="600" height="320" rx="14" fill="url(#svcDetailBg)"/>

  <!-- LEFT: chat bubbles (input) -->
  <g transform="translate(36 50)">
    <text x="0" y="-12" fill="#737373" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">INPUT — 자연어</text>

    <!-- bubble 1 -->
    <g>
      <path d="M0 0 L150 0 Q160 0 160 10 L160 38 Q160 48 150 48 L24 48 L14 60 L18 48 L10 48 Q0 48 0 38 Z"
            fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
      <rect x="14" y="14" width="120" height="5" rx="2.5" fill="#1a1a1a"/>
      <rect x="14" y="24" width="100" height="5" rx="2.5" fill="#a3a3a3"/>
      <rect x="14" y="34" width="80"  height="5" rx="2.5" fill="#a3a3a3"/>
    </g>

    <!-- bubble 2 -->
    <g transform="translate(20 80)">
      <path d="M0 0 L150 0 Q160 0 160 10 L160 38 Q160 48 150 48 L24 48 L14 60 L18 48 L10 48 Q0 48 0 38 Z"
            fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
      <rect x="14" y="14" width="110" height="5" rx="2.5" fill="#1a1a1a"/>
      <rect x="14" y="24" width="130" height="5" rx="2.5" fill="#a3a3a3"/>
      <rect x="14" y="34" width="70"  height="5" rx="2.5" fill="#a3a3a3"/>
    </g>

    <!-- bubble 3 -->
    <g transform="translate(0 160)">
      <path d="M0 0 L150 0 Q160 0 160 10 L160 38 Q160 48 150 48 L24 48 L14 60 L18 48 L10 48 Q0 48 0 38 Z"
            fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
      <rect x="14" y="14" width="100" height="5" rx="2.5" fill="#1a1a1a"/>
      <rect x="14" y="24" width="120" height="5" rx="2.5" fill="#a3a3a3"/>
      <rect x="14" y="34" width="90"  height="5" rx="2.5" fill="#a3a3a3"/>
    </g>
  </g>

  <!-- ARROW: AI processing -->
  <g transform="translate(225 140)">
    <line x1="0" y1="20" x2="100" y2="20" stroke="url(#svcArrow)" stroke-width="3" stroke-linecap="round"/>
    <path d="M92 12 L102 20 L92 28" stroke="#2563eb" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(50 -12)">
      <circle r="22" fill="#2563eb"/>
      <text y="5" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" letter-spacing="0.5">AI</text>
    </g>
  </g>

  <!-- RIGHT: insights (output) -->
  <g transform="translate(360 50)">
    <text x="0" y="-12" fill="#737373" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">OUTPUT — 인사이트</text>

    <!-- card: sentiment -->
    <g>
      <rect width="200" height="84" rx="12" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
      <rect x="14" y="14" width="58" height="6" rx="3" fill="#a3a3a3"/>
      <text x="14" y="46" fill="#1a1a1a" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700">긍정 78%</text>
      <!-- segmented bar -->
      <g transform="translate(14 58)">
        <rect width="135" height="8" rx="4" fill="#d7efdc"/>
        <rect width="40"  height="8" rx="4" x="135" fill="#fef3c7"/>
        <rect width="0"   height="8" rx="4" x="175" fill="#fee2e2"/>
        <rect width="11"  height="8" rx="4" x="172" fill="#fee2e2"/>
      </g>
    </g>

    <!-- card: top keywords -->
    <g transform="translate(0 100)">
      <rect width="200" height="120" rx="12" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
      <rect x="14" y="14" width="76" height="6" rx="3" fill="#a3a3a3"/>
      <!-- keyword pills -->
      <g transform="translate(14 30)">
        <g>
          <rect width="58" height="22" rx="11" fill="#dce1f9"/>
          <text x="29" y="15" text-anchor="middle" fill="#334bfa" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">캠페인</text>
        </g>
        <g transform="translate(64 0)">
          <rect width="62" height="22" rx="11" fill="#eff6ff"/>
          <text x="31" y="15" text-anchor="middle" fill="#2563eb" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">ROI 23%</text>
        </g>
        <g transform="translate(0 30)">
          <rect width="48" height="22" rx="11" fill="#d7efdc"/>
          <text x="24" y="15" text-anchor="middle" fill="#0f7134" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">전환율</text>
        </g>
        <g transform="translate(54 30)">
          <rect width="52" height="22" rx="11" fill="#fef3c7"/>
          <text x="26" y="15" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">개선점</text>
        </g>
        <g transform="translate(112 30)">
          <rect width="58" height="22" rx="11" fill="#eff6ff"/>
          <text x="29" y="15" text-anchor="middle" fill="#2563eb" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">신규고객</text>
        </g>
        <!-- mini trend -->
        <g transform="translate(0 64)">
          <path d="M0 14 L20 10 L40 12 L60 6 L80 8 L100 4 L120 6 L140 2"
                stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="140" cy="2" r="3.5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
        </g>
      </g>
    </g>
  </g>
</svg>
