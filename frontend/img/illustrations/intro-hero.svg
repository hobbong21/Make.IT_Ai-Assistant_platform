<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-labelledby="introHeroTitle introHeroDesc">
  <title id="introHeroTitle">사람과 AI가 함께 일하는 마케팅</title>
  <desc id="introHeroDesc">사람 캐릭터와 AI 노드가 데이터를 함께 분석하는 추상 일러스트</desc>
  <defs>
    <linearGradient id="introBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="introOrb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="60%" stop-color="#2563eb" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" rx="14" fill="url(#introBg)"/>

  <!-- decorative dotted grid -->
  <g fill="#737373" opacity="0.15">
    <circle cx="60"  cy="60"  r="2"/>
    <circle cx="120" cy="60"  r="2"/>
    <circle cx="540" cy="340" r="2"/>
    <circle cx="540" cy="280" r="2"/>
    <circle cx="480" cy="340" r="2"/>
  </g>

  <!-- left: human silhouette -->
  <g transform="translate(80 110)">
    <!-- head -->
    <circle cx="60" cy="30" r="26" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <!-- body shape -->
    <path d="M14 130 Q14 80 60 80 Q106 80 106 130 L106 200 L14 200 Z"
          fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <!-- subtle shoulder shadow -->
    <path d="M14 130 Q40 110 60 110 Q80 110 106 130" stroke="#e6e6e6" stroke-width="1.5" fill="none"/>
    <!-- gesture: arm extending toward AI -->
    <path d="M88 140 Q140 130 180 110" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="184" cy="108" r="5" fill="#2563eb"/>
  </g>

  <!-- center: AI orb with neural pattern -->
  <g transform="translate(280 100)">
    <circle cx="60" cy="100" r="68" fill="url(#introOrb)"/>
    <circle cx="60" cy="100" r="68" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <!-- neural nodes -->
    <g fill="#ffffff" opacity="0.95">
      <circle cx="30"  cy="80"  r="4"/>
      <circle cx="60"  cy="60"  r="4"/>
      <circle cx="90"  cy="80"  r="4"/>
      <circle cx="40"  cy="120" r="4"/>
      <circle cx="80"  cy="120" r="4"/>
      <circle cx="60"  cy="140" r="5"/>
    </g>
    <!-- neural lines -->
    <g stroke="#ffffff" stroke-width="1.2" opacity="0.65" fill="none">
      <path d="M30 80 L60 60 L90 80"/>
      <path d="M40 120 L60 60"/>
      <path d="M80 120 L60 60"/>
      <path d="M40 120 L60 140 L80 120"/>
      <path d="M30 80 L40 120"/>
      <path d="M90 80 L80 120"/>
    </g>
  </g>

  <!-- right: data charts emerging -->
  <g transform="translate(440 100)">
    <!-- card 1 -->
    <g>
      <rect width="110" height="80" rx="12" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
      <rect x="14" y="14" width="40" height="6" rx="3" fill="#a3a3a3"/>
      <path d="M14 60 L34 50 L54 56 L74 38 L94 44" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="74" cy="38" r="3.5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    </g>
    <!-- card 2 (offset) -->
    <g transform="translate(20 110)">
      <rect width="110" height="80" rx="12" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
      <rect x="14" y="14" width="50" height="6" rx="3" fill="#a3a3a3"/>
      <g transform="translate(14 32)">
        <rect x="0"  y="20" width="12" height="22" rx="2" fill="#2563eb" opacity="0.4"/>
        <rect x="16" y="12" width="12" height="30" rx="2" fill="#2563eb" opacity="0.65"/>
        <rect x="32" y="6"  width="12" height="36" rx="2" fill="#2563eb"/>
        <rect x="48" y="14" width="12" height="28" rx="2" fill="#2563eb" opacity="0.5"/>
        <rect x="64" y="18" width="12" height="24" rx="2" fill="#2563eb" opacity="0.6"/>
      </g>
    </g>
  </g>

  <!-- connecting flow lines (human → AI → output) -->
  <g stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 4" fill="none" opacity="0.5">
    <path d="M260 200 Q310 200 340 200"/>
    <path d="M400 200 Q420 200 440 180"/>
    <path d="M400 220 Q420 240 460 280"/>
  </g>
</svg>
