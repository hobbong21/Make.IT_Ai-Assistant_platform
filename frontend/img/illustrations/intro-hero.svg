<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-labelledby="introHeroTitle introHeroDesc">
  <title id="introHeroTitle">AI 마케팅 플랫폼</title>
  <desc id="introHeroDesc">데이터·콘텐츠·고객 응대 모듈이 통합된 플랫폼 추상 일러스트</desc>
  <defs>
    <linearGradient id="introBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f5f4ec"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" rx="16" fill="url(#introBg)"/>

  <!-- main dashboard card -->
  <g transform="translate(70 60)">
    <rect width="380" height="280" rx="14" fill="#ffffff" stroke="#e8e6dc" stroke-width="1.2"/>
    <!-- header -->
    <line x1="0" y1="44" x2="380" y2="44" stroke="#e8e6dc" stroke-width="1"/>
    <rect x="20" y="18" width="80" height="8" rx="4" fill="#3d3929"/>
    <circle cx="350" cy="22" r="5" fill="#fae5d3"/>
    <!-- KPI row -->
    <g transform="translate(20 64)">
      <rect width="108" height="64" rx="10" fill="#faf9f5" stroke="#e8e6dc"/>
      <rect x="14" y="14" width="38" height="5" rx="2.5" fill="#97948a"/>
      <rect x="14" y="26" width="58" height="14" rx="3" fill="#3d3929"/>
      <path d="M14 54 L34 48 L54 50 L74 42 L94 46" stroke="#c96442" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(136 64)">
      <rect width="108" height="64" rx="10" fill="#faf9f5" stroke="#e8e6dc"/>
      <rect x="14" y="14" width="38" height="5" rx="2.5" fill="#97948a"/>
      <rect x="14" y="26" width="44" height="14" rx="3" fill="#3d3929"/>
      <g transform="translate(14 48)">
        <rect x="0"  y="6"  width="10" height="10" rx="2" fill="#fae5d3"/>
        <rect x="14" y="2"  width="10" height="14" rx="2" fill="#d98a6c"/>
        <rect x="28" y="0"  width="10" height="16" rx="2" fill="#c96442"/>
        <rect x="42" y="4"  width="10" height="12" rx="2" fill="#d98a6c"/>
        <rect x="56" y="2"  width="10" height="14" rx="2" fill="#c96442"/>
      </g>
    </g>
    <g transform="translate(252 64)">
      <rect width="108" height="64" rx="10" fill="#c96442"/>
      <rect x="14" y="14" width="42" height="5" rx="2.5" fill="#ffffff" opacity="0.55"/>
      <rect x="14" y="26" width="64" height="14" rx="3" fill="#ffffff"/>
      <rect x="14" y="48" width="40" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
    </g>
    <!-- main chart -->
    <g transform="translate(20 148)">
      <rect width="340" height="116" rx="10" fill="#faf9f5" stroke="#e8e6dc"/>
      <line x1="20" y1="28" x2="320" y2="28" stroke="#e8e6dc" stroke-dasharray="2 4"/>
      <line x1="20" y1="62" x2="320" y2="62" stroke="#e8e6dc" stroke-dasharray="2 4"/>
      <line x1="20" y1="96" x2="320" y2="96" stroke="#e8e6dc" stroke-dasharray="2 4"/>
      <path d="M20 86 L60 76 L100 64 L140 68 L180 50 L220 56 L260 36 L300 42 L320 24 L320 100 L20 100 Z"
            fill="#c96442" fill-opacity="0.10"/>
      <path d="M20 86 L60 76 L100 64 L140 68 L180 50 L220 56 L260 36 L300 42 L320 24"
            stroke="#c96442" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="260" cy="36" r="4" fill="#ffffff" stroke="#c96442" stroke-width="2"/>
    </g>
  </g>

  <!-- side floating module card -->
  <g transform="translate(440 130)">
    <rect width="120" height="80" rx="12" fill="#ffffff" stroke="#e8e6dc" stroke-width="1.2"/>
    <circle cx="22" cy="22" r="10" fill="#fdf4ee"/>
    <path d="M16 22 L20 26 L28 18" stroke="#c96442" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="16" width="62" height="6" rx="3" fill="#3d3929"/>
    <rect x="40" y="26" width="48" height="4" rx="2" fill="#97948a"/>
    <rect x="14" y="50" width="92" height="6" rx="3" fill="#fae5d3"/>
    <rect x="14" y="50" width="64" height="6" rx="3" fill="#c96442"/>
    <rect x="14" y="64" width="40" height="4" rx="2" fill="#97948a"/>
  </g>

  <g transform="translate(460 240)">
    <rect width="120" height="60" rx="12" fill="#ffffff" stroke="#e8e6dc" stroke-width="1.2"/>
    <rect x="14" y="14" width="50" height="6" rx="3" fill="#3d3929"/>
    <rect x="14" y="26" width="80" height="4" rx="2" fill="#97948a"/>
    <rect x="14" y="40" width="44" height="10" rx="5" fill="#c96442"/>
  </g>
</svg>
