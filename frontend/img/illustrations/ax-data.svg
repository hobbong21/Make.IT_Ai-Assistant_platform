<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-labelledby="axDataTitle axDataDesc">
  <title id="axDataTitle">AX Data Intelligence</title>
  <desc id="axDataDesc">다양한 데이터 소스가 인사이트 차트로 변환되는 모습</desc>
  <defs>
    <linearGradient id="axDataBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f5f4ec"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="12" fill="url(#axDataBg)"/>

  <!-- 좌측: 데이터 소스 카드 -->
  <g transform="translate(20 32)" font-family="system-ui,-apple-system,sans-serif">
    <g>
      <rect width="92" height="28" rx="14" fill="#ffffff" stroke="#e8e6dc"/>
      <circle cx="14" cy="14" r="6" fill="#fdf4ee"/>
      <path d="M11 14 L13 16 L17 12" stroke="#c96442" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="26" y="18" fill="#3d3929" font-size="9" font-weight="600">자연어</text>
    </g>
    <g transform="translate(0 40)">
      <rect width="92" height="28" rx="14" fill="#ffffff" stroke="#e8e6dc"/>
      <circle cx="14" cy="14" r="6" fill="#fdf4ee"/>
      <path d="M10 14 L18 14 M14 10 L14 18" stroke="#c96442" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <text x="26" y="18" fill="#3d3929" font-size="9" font-weight="600">댓글</text>
    </g>
    <g transform="translate(0 80)">
      <rect width="92" height="28" rx="14" fill="#ffffff" stroke="#e8e6dc"/>
      <circle cx="14" cy="14" r="6" fill="#fdf4ee"/>
      <path d="M10 11 L18 11 L18 17 L10 17 Z M14 11 L14 17" stroke="#c96442" stroke-width="1.4" fill="none"/>
      <text x="26" y="18" fill="#3d3929" font-size="9" font-weight="600">URL</text>
    </g>
  </g>

  <!-- 중앙 화살표 + AI 닷 -->
  <g transform="translate(118 92)">
    <line x1="0" y1="0" x2="48" y2="0" stroke="#c96442" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 3"/>
    <circle cx="24" cy="0" r="10" fill="#c96442"/>
    <circle cx="24" cy="0" r="3" fill="#ffffff"/>
  </g>

  <!-- 우측: 분석 결과 -->
  <g transform="translate(180 24)" font-family="system-ui,-apple-system,sans-serif">
    <rect width="120" height="152" rx="10" fill="#ffffff" stroke="#e8e6dc"/>
    <rect x="14" y="14" width="58" height="6" rx="3" fill="#97948a"/>
    <text x="14" y="44" fill="#3d3929" font-size="20" font-weight="700">+24.8%</text>
    <g transform="translate(14 64)">
      <line x1="0" y1="40" x2="92" y2="40" stroke="#e8e6dc" stroke-dasharray="2 3"/>
      <line x1="0" y1="20" x2="92" y2="20" stroke="#e8e6dc" stroke-dasharray="2 3"/>
      <line x1="0" y1="0"  x2="92" y2="0"  stroke="#e8e6dc" stroke-dasharray="2 3"/>
      <path d="M0 38 L18 32 L36 26 L54 18 L72 12 L90 4"
            stroke="#c96442" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M54 18 L72 12 L90 4" stroke="#c96442" stroke-width="2" stroke-dasharray="3 3" fill="none" opacity="0.7"/>
      <circle cx="90" cy="4"  r="3" fill="#ffffff" stroke="#c96442" stroke-width="2"/>
    </g>
    <rect x="14" y="124" width="44" height="14" rx="7" fill="#fdf4ee"/>
    <text x="36" y="134" text-anchor="middle" fill="#c96442" font-size="8" font-weight="600">예측</text>
    <rect x="62" y="124" width="44" height="14" rx="7" fill="#f5f4ec"/>
    <text x="84" y="134" text-anchor="middle" fill="#6b6857" font-size="8" font-weight="600">분석</text>
  </g>
</svg>
