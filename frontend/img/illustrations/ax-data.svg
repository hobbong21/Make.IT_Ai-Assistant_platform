<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-labelledby="axDataTitle axDataDesc">
  <title id="axDataTitle">AX Data Intelligence</title>
  <desc id="axDataDesc">자연어·URL·댓글 데이터가 인사이트와 예측 차트로 변환되는 모습</desc>
  <defs>
    <linearGradient id="axDataBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="12" fill="url(#axDataBg)"/>

  <!-- 좌측: 데이터 소스 3종 -->
  <g transform="translate(20 32)">
    <g>
      <rect width="92" height="28" rx="14" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.2"/>
      <circle cx="14" cy="14" r="6" fill="#dce1f9"/>
      <path d="M11 14 L13 16 L17 12" stroke="#334bfa" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="26" y="18" fill="#1a1a1a" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600">자연어</text>
    </g>
    <g transform="translate(0 40)">
      <rect width="92" height="28" rx="14" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.2"/>
      <circle cx="14" cy="14" r="6" fill="#fee2e2"/>
      <path d="M9 14 L19 14 M14 9 L14 19" stroke="#991b1b" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <text x="26" y="18" fill="#1a1a1a" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600">댓글</text>
    </g>
    <g transform="translate(0 80)">
      <rect width="92" height="28" rx="14" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.2"/>
      <circle cx="14" cy="14" r="6" fill="#d7efdc"/>
      <path d="M10 11 L18 11 L18 17 L10 17 Z M14 11 L14 17" stroke="#0f7134" stroke-width="1.4" fill="none"/>
      <text x="26" y="18" fill="#1a1a1a" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600">URL</text>
    </g>
  </g>

  <!-- 중앙 화살표 + AI -->
  <g transform="translate(118 92)">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
    <path d="M40 -5 L48 0 L40 5" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(24 -22)">
      <circle r="14" fill="#2563eb"/>
      <text y="3" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700">AI</text>
    </g>
  </g>

  <!-- 우측: 분석 결과 차트 -->
  <g transform="translate(180 24)">
    <rect width="120" height="152" rx="10" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
    <rect x="14" y="14" width="58" height="6" rx="3" fill="#a3a3a3"/>
    <text x="14" y="42" fill="#1a1a1a" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700">+24.8%</text>
    <!-- prediction line -->
    <g transform="translate(14 60)">
      <line x1="0" y1="40" x2="92" y2="40" stroke="#e6e6e6" stroke-dasharray="2 3"/>
      <line x1="0" y1="20" x2="92" y2="20" stroke="#e6e6e6" stroke-dasharray="2 3"/>
      <line x1="0" y1="0"  x2="92" y2="0"  stroke="#e6e6e6" stroke-dasharray="2 3"/>
      <path d="M0 38 L18 32 L36 26 L54 18 L72 12 L90 4"
            stroke="#2563eb" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M54 18 L72 12 L90 4" stroke="#2563eb" stroke-width="2.2" stroke-dasharray="3 3" fill="none"/>
      <circle cx="54" cy="18" r="3" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <circle cx="90" cy="4"  r="3" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    </g>
    <rect x="14" y="124" width="44" height="14" rx="7" fill="#d7efdc"/>
    <text x="36" y="134" text-anchor="middle" fill="#0f7134" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600">예측</text>
    <rect x="62" y="124" width="44" height="14" rx="7" fill="#dce1f9"/>
    <text x="84" y="134" text-anchor="middle" fill="#334bfa" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600">분석</text>
  </g>
</svg>
