<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-labelledby="axMktTitle axMktDesc">
  <title id="axMktTitle">AX Marketing Intelligence</title>
  <desc id="axMktDesc">AI가 마케팅 콘텐츠와 이미지를 생성·최적화하는 모습</desc>
  <defs>
    <linearGradient id="axMktBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="axMktAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="12" fill="url(#axMktBg)"/>

  <!-- 좌측: 콘텐츠 카드 (광고 크리에이티브) -->
  <g transform="translate(24 28)">
    <rect width="120" height="144" rx="12" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
    <!-- image area -->
    <rect x="10" y="10" width="100" height="58" rx="8" fill="url(#axMktAccent)"/>
    <circle cx="38" cy="34" r="10" fill="#ffffff" opacity="0.7"/>
    <path d="M52 56 L70 38 L88 50 L100 30 L100 60 L18 60 Z" fill="#ffffff" opacity="0.4"/>
    <!-- copy lines -->
    <rect x="10" y="76"  width="80" height="6" rx="3" fill="#1a1a1a"/>
    <rect x="10" y="88"  width="100" height="5" rx="2.5" fill="#a3a3a3"/>
    <rect x="10" y="98"  width="68" height="5" rx="2.5" fill="#a3a3a3"/>
    <!-- CTA -->
    <rect x="10" y="116" width="56" height="20" rx="10" fill="#2563eb"/>
    <text x="38" y="129" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700">CTA</text>
    <circle cx="100" cy="126" r="8" fill="#fef3c7"/>
    <text x="100" y="129" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700">A/B</text>
  </g>

  <!-- 중앙 sparkle (AI generation) -->
  <g transform="translate(160 92)">
    <path d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2 Z" fill="#2563eb"/>
    <circle cx="-14" cy="-14" r="2" fill="#4f46e5"/>
    <circle cx="14" cy="14" r="2" fill="#4f46e5"/>
  </g>

  <!-- 우측: 채널 분포 + 변형 -->
  <g transform="translate(186 28)">
    <rect width="120" height="68" rx="10" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
    <rect x="12" y="12" width="50" height="6" rx="3" fill="#a3a3a3"/>
    <text x="12" y="38" fill="#1a1a1a" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700">12 채널</text>
    <g transform="translate(12 46)">
      <rect width="20" height="12" rx="6" fill="#dce1f9"/>
      <rect x="22" width="28" height="12" rx="6" fill="#eff6ff"/>
      <rect x="52" width="22" height="12" rx="6" fill="#d7efdc"/>
      <rect x="76" width="18" height="12" rx="6" fill="#fef3c7"/>
    </g>
  </g>

  <g transform="translate(186 108)">
    <rect width="120" height="68" rx="10" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5"/>
    <rect x="12" y="12" width="50" height="6" rx="3" fill="#a3a3a3"/>
    <!-- mini variant grid -->
    <g transform="translate(12 24)">
      <rect width="22" height="16" rx="4" fill="#2563eb"/>
      <rect x="26" width="22" height="16" rx="4" fill="#4f46e5"/>
      <rect x="52" width="22" height="16" rx="4" fill="#2563eb" opacity="0.55"/>
      <rect x="78" width="22" height="16" rx="4" fill="#4f46e5" opacity="0.55"/>
      <rect width="22" height="16" rx="4" y="22" fill="#4f46e5" opacity="0.55"/>
      <rect x="26" width="22" height="16" rx="4" y="22" fill="#2563eb" opacity="0.55"/>
      <rect x="52" width="22" height="16" rx="4" y="22" fill="#4f46e5"/>
      <rect x="78" width="22" height="16" rx="4" y="22" fill="#2563eb"/>
    </g>
  </g>
</svg>
