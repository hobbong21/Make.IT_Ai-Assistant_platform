      <rect x="10" y="10" width="76" height="4" rx="2" fill="#3d3929"/>
      <rect x="10" y="18" width="60" height="4" rx="2" fill="#97948a"/>
      <rect x="10" y="26" width="40" height="4" rx="2" fill="#97948a"/>
