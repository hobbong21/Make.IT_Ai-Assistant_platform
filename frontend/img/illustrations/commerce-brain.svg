      <rect x="10" y="10" width="60" height="4" rx="2" fill="#c96442"/>
      <rect x="10" y="18" width="48" height="4" rx="2" fill="#c96442" opacity="0.6"/>
    </g>
  </g>

  <!-- 우측 상단: 리뷰 -->
  <g transform="translate(184 24)" font-family="system-ui,-apple-system,sans-serif">
    <rect width="118" height="68" rx="10" fill="#ffffff" stroke="#e8e6dc"/>
    <rect x="12" y="12" width="50" height="6" rx="3" fill="#97948a"/>
    <text x="12" y="38" fill="#3d3929" font-size="14" font-weight="700">4.8</text>
    <g transform="translate(38 28)" fill="#c96442">
      <path d="M6 0 L7.4 4 L12 4 L8.5 7 L9.8 11.5 L6 9 L2.2 11.5 L3.5 7 L0 4 L4.6 4 Z"/>
      <path transform="translate(14 0)" d="M6 0 L7.4 4 L12 4 L8.5 7 L9.8 11.5 L6 9 L2.2 11.5 L3.5 7 L0 4 L4.6 4 Z"/>
      <path transform="translate(28 0)" d="M6 0 L7.4 4 L12 4 L8.5 7 L9.8 11.5 L6 9 L2.2 11.5 L3.5 7 L0 4 L4.6 4 Z"/>
      <path transform="translate(42 0)" d="M6 0 L7.4 4 L12 4 L8.5 7 L9.8 11.5 L6 9 L2.2 11.5 L3.5 7 L0 4 L4.6 4 Z"/>
      <path transform="translate(56 0)" fill="#e8e6dc" d="M6 0 L7.4 4 L12 4 L8.5 7 L9.8 11.5 L6 9 L2.2 11.5 L3.5 7 L0 4 L4.6 4 Z"/>
