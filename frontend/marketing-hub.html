<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마케팅 허브 - MaKIT</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/app-shell.css">
    <style>
        /* Marketing Hub Page Styles */
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--mk-space-lg);
        }

        .page-header {
            margin-bottom: var(--mk-space-xl);
        }

        .page-title {
            font-size: clamp(28px, 4vw, 36px);
            font-weight: 600;
            color: var(--mk-color-text-primary);
            margin-bottom: var(--mk-space-sm);
            display: flex;
            align-items: center;
            gap: var(--mk-space-md);
        }

        .page-subtitle {
            color: var(--mk-color-text-secondary);
            font-size: 14px;
            margin-bottom: var(--mk-space-lg);
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--mk-space-md);
            margin-bottom: var(--mk-space-xl);
        }

        .summary-card {
            background: var(--mk-color-bg-secondary);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-lg);
            padding: var(--mk-space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--mk-space-sm);
            transition: all 0.2s ease;
        }

        .summary-card:hover {
            border-color: var(--mk-color-primary);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.08);
        }

        .summary-card-label {
            font-size: 13px;
            color: var(--mk-color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .summary-card-value {
            font-size: clamp(24px, 3vw, 32px);
            font-weight: 700;
            color: var(--mk-color-text-primary);
        }

        .summary-card-meta {
            font-size: 12px;
            color: var(--mk-color-text-tertiary);
            margin-top: auto;
        }

        /* Section Containers */
        .section {
            background: var(--mk-color-bg-secondary);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-lg);
            padding: var(--mk-space-lg);
            margin-bottom: var(--mk-space-xl);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--mk-space-lg);
            border-bottom: 1px solid var(--mk-color-border);
            padding-bottom: var(--mk-space-lg);
        }

        .section-title {
            font-size: clamp(18px, 2.5vw, 22px);
            font-weight: 600;
            color: var(--mk-color-text-primary);
            display: flex;
            align-items: center;
            gap: var(--mk-space-sm);
        }

        .section-action {
            font-size: 12px;
            padding: 6px 12px;
            background: var(--mk-color-primary);
            color: white;
            border: none;
            border-radius: var(--mk-radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .section-action:hover {
            background: var(--mk-color-primary-dark);
            transform: translateY(-1px);
        }

        /* Campaign Board (Kanban) */
        .campaign-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--mk-space-lg);
            overflow-x: auto;
            padding-bottom: var(--mk-space-md);
        }

        .campaign-column {
            background: var(--mk-color-bg-tertiary);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-md);
            padding: var(--mk-space-md);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            gap: var(--mk-space-sm);
        }

        .campaign-column-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--mk-color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: var(--mk-space-sm);
            border-bottom: 2px solid var(--mk-color-primary);
        }

        .campaign-column-count {
            display: inline-block;
            margin-left: var(--mk-space-xs);
            font-size: 11px;
            background: var(--mk-color-primary);
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .campaign-card {
            background: var(--mk-color-bg-secondary);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-md);
            padding: var(--mk-space-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .campaign-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.1);
        }

        .campaign-card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--mk-color-text-primary);
            margin-bottom: var(--mk-space-xs);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .campaign-card-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: var(--mk-color-text-secondary);
        }

        .campaign-card-badge {
            display: inline-block;
            font-size: 10px;
            padding: 3px 6px;
            background: var(--mk-color-info-light);
            color: var(--mk-color-info);
            border-radius: 4px;
            margin-right: 4px;
            width: fit-content;
        }

        .campaign-empty {
            color: var(--mk-color-text-tertiary);
            font-size: 13px;
            text-align: center;
            padding: var(--mk-space-lg);
        }

        /* Content Library Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--mk-space-md);
        }

        .content-card {
            background: var(--mk-color-bg-tertiary);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-md);
            overflow: hidden;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .content-card:hover {
            transform: translateY(-2px);
            border-color: var(--mk-color-primary);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.1);
        }

        .content-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--mk-color-primary) 0%, var(--mk-color-secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        .content-info {
            padding: var(--mk-space-md);
        }

        .content-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--mk-color-text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .content-meta {
            font-size: 11px;
            color: var(--mk-color-text-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-type-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            background: var(--mk-color-success-light);
            color: var(--mk-color-success);
            border-radius: 3px;
            margin-bottom: 4px;
            width: fit-content;
        }

        .content-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: var(--mk-space-xl);
            color: var(--mk-color-text-tertiary);
        }

        /* Calendar Heatmap */
        .calendar-week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: var(--mk-space-sm);
        }

        .calendar-day {
            background: var(--mk-color-bg-tertiary);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-md);
            padding: var(--mk-space-md);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .calendar-day:hover {
            border-color: var(--mk-color-primary);
            transform: translateY(-2px);
        }

        .calendar-day-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--mk-color-text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .calendar-day-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--mk-color-primary);
        }

        .calendar-day-date {
            font-size: 11px;
            color: var(--mk-color-text-tertiary);
            margin-top: 4px;
        }

        .calendar-day--empty .calendar-day-count {
            color: var(--mk-color-text-tertiary);
        }

        .calendar-day--busy {
            background: linear-gradient(135deg, var(--mk-color-primary-light) 0%, var(--mk-color-secondary-light) 100%);
        }

        .calendar-summary {
            background: var(--mk-color-info-light);
            border-left: 4px solid var(--mk-color-info);
            border-radius: var(--mk-radius-md);
            padding: var(--mk-space-md);
            margin-top: var(--mk-space-lg);
            font-size: 13px;
            color: var(--mk-color-info);
        }

        .calendar-summary strong {
            color: var(--mk-color-info-dark);
        }

        /* AI Insights */
        .insights-card {
            background: linear-gradient(135deg, var(--mk-color-primary-light) 0%, var(--mk-color-secondary-light) 100%);
            border: 1px solid var(--mk-color-primary);
            border-radius: var(--mk-radius-lg);
            padding: var(--mk-space-lg);
        }

        .insights-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--mk-space-lg);
            font-size: 12px;
            color: var(--mk-color-text-secondary);
        }

        .insights-refresh-btn {
            font-size: 12px;
            padding: 6px 12px;
            background: var(--mk-color-primary);
            color: white;
            border: none;
            border-radius: var(--mk-radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .insights-refresh-btn:hover {
            background: var(--mk-color-primary-dark);
        }

        .mk-md-content {
            font-size: 13px;
            line-height: 1.6;
            color: var(--mk-color-text-primary);
        }

        .mk-md-content h1, .mk-md-content h2, .mk-md-content h3 {
            margin-top: var(--mk-space-md);
            margin-bottom: var(--mk-space-sm);
            font-weight: 600;
            color: var(--mk-color-text-primary);
        }

        .mk-md-content h1 { font-size: 20px; }
        .mk-md-content h2 { font-size: 16px; }
        .mk-md-content h3 { font-size: 14px; }

        .mk-md-content ul, .mk-md-content ol {
            margin-left: var(--mk-space-lg);
            margin-bottom: var(--mk-space-md);
        }

        .mk-md-content li {
            margin-bottom: 4px;
        }

        .mk-md-content code {
            background: var(--mk-color-bg-secondary);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .mk-md-content pre {
            background: var(--mk-color-bg-secondary);
            padding: var(--mk-space-md);
            border-radius: var(--mk-radius-md);
            overflow-x: auto;
            margin-bottom: var(--mk-space-md);
        }

        .mk-md-content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        .mk-md-content a {
            color: var(--mk-color-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--mk-color-primary);
        }

        .mk-md-content a:hover {
            text-decoration: underline;
        }

        .mk-md-content p {
            margin-bottom: var(--mk-space-md);
        }

        .insights-empty {
            text-align: center;
            padding: var(--mk-space-xl);
            color: var(--mk-color-text-secondary);
        }

        /* Channel Performance */
        .channel-tabs {
            display: flex;
            gap: var(--mk-space-sm);
            margin-bottom: var(--mk-space-lg);
            flex-wrap: wrap;
        }

        .channel-tab {
            padding: 8px 16px;
            background: var(--mk-color-bg-tertiary);
            border: 1px solid var(--mk-color-border);
            border-radius: var(--mk-radius-md);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--mk-color-text-secondary);
            transition: all 0.2s ease;
        }

        .channel-tab.active {
            background: var(--mk-color-primary);
            color: white;
            border-color: var(--mk-color-primary);
        }

        .channel-tab:hover:not(.active) {
            border-color: var(--mk-color-primary);
        }

        .channel-content {
            display: none;
        }

        .channel-content.active {
            display: block;
        }

        .channel-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--mk-space-md);
            margin-bottom: var(--mk-space-lg);
        }

        .channel-stat {
            background: var(--mk-color-bg-tertiary);
            border-radius: var(--mk-radius-md);
            padding: var(--mk-space-md);
            text-align: center;
        }

        .channel-stat-label {
            font-size: 12px;
            color: var(--mk-color-text-secondary);
            margin-bottom: 4px;
        }

        .channel-stat-value {
            font-size: clamp(18px, 2.5vw, 24px);
            font-weight: 700;
            color: var(--mk-color-primary);
        }

        .channel-stat-change {
            font-size: 11px;
            margin-top: 4px;
            color: var(--mk-color-success);
        }

        .channel-stat-change.negative {
            color: var(--mk-color-danger);
        }

        .channel-chart-container {
            position: relative;
            height: 300px;
            margin-top: var(--mk-space-lg);
        }

        .channel-empty {
            text-align: center;
            padding: var(--mk-space-xl);
            color: var(--mk-color-text-tertiary);
        }

        /* Loading & Error States */
        .loading-skeleton {
            background: linear-gradient(90deg, var(--mk-color-border) 25%, var(--mk-color-bg-tertiary) 50%, var(--mk-color-border) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: var(--mk-radius-md);
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .error-message {
            background: var(--mk-color-danger-light);
            color: var(--mk-color-danger);
            border: 1px solid var(--mk-color-danger);
            border-radius: var(--mk-radius-md);
            padding: var(--mk-space-md);
            margin-bottom: var(--mk-space-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-container {
                padding: var(--mk-space-md);
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .campaign-board {
                grid-template-columns: 1fr;
            }

            .content-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .calendar-week {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }

            .channel-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .page-title {
                font-size: 22px;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .calendar-week {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            }

            .channel-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
