# ==============================================================================
# application.yml — AI layer snippet
# Author: ai-engineer | Date: 2026-04-20
# Merge into backend/src/main/resources/application.yml.
# Environment overrides (AWS_*, BEDROCK_REGION, etc.) come via Spring relaxed binding.
# ==============================================================================

spring:
  threads:
    virtual:
      enabled: true
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

aws:
  region: ${AWS_REGION:ap-northeast-2}
  bedrock:
    # Flip to false (or set profile=mock) to activate MockBedrockService.
    enabled: ${BEDROCK_ENABLED:true}
    region: ${BEDROCK_REGION:${AWS_REGION:ap-northeast-2}}
    models:
      claudeHaiku:     anthropic.claude-3-haiku-20240307-v1:0
      claudeSonnet:    anthropic.claude-3-5-sonnet-20240620-v1:0
      titanEmbed:      amazon.titan-embed-text-v2:0
      stableDiffusion: stability.stable-diffusion-xl-v1
      titanImage:      amazon.titan-image-generator-v1
    defaults:
      maxTokensText:       1024
      maxTokensAnalysis:   4096
      temperature:         0.3
      temperatureAnalysis: 0.1
      imageSteps:          40
      imageCfgScale:       7.5
    rag:
      chunkSize:    1000
      chunkOverlap: 200
    # USD per 1K tokens. Source: AWS Bedrock pricing 2026-04. Tune as prices change.
    tariff:
      anthropic.claude-3-haiku-20240307-v1:0:
        inputPer1k:  0.00025
        outputPer1k: 0.00125
      anthropic.claude-3-5-sonnet-20240620-v1:0:
        inputPer1k:  0.003
        outputPer1k: 0.015
      amazon.titan-embed-text-v2:0:
        inputPer1k:  0.00002
        outputPer1k: 0.0
      stability.stable-diffusion-xl-v1:
        inputPer1k:  0.0
        outputPer1k: 0.0
      amazon.titan-image-generator-v1:
        inputPer1k:  0.0
        outputPer1k: 0.0
    s3:
      bucket:      ${MAKIT_ASSETS_BUCKET:makit-assets-dev}
      assetPrefix: generated/

resilience4j:
  circuitbreaker:
    instances:
      bedrock:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 20s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      bedrock:
        max-attempts: 2
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - software.amazon.awssdk.services.bedrockruntime.model.ModelTimeoutException
          - software.amazon.awssdk.services.bedrockruntime.model.ThrottlingException
          - software.amazon.awssdk.core.exception.SdkClientException
  ratelimiter:
    instances:
      bedrock:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: makit-backend
    distribution:
      percentiles-histogram:
        bedrock.invoke: true
        http.server.requests: true

logging:
  level:
    com.humanad.makit.ai: INFO
    software.amazon.awssdk: WARN
    io.github.resilience4j: INFO
