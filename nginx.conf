server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck (plain text, no auth)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # SSE streaming endpoint — buffering must be OFF for token-by-token delivery
    location = /api/commerce/chatbot/stream {
        proxy_pass http://backend:8083/api/commerce/chatbot/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Generic API proxy — long-poll friendly
    location /api/ {
        proxy_pass http://backend:8083/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # Swagger passthrough (dev convenience)
    location /swagger-ui.html { proxy_pass http://backend:8083/swagger-ui.html; }
    location /swagger-ui/     { proxy_pass http://backend:8083/swagger-ui/; }
    location /v3/api-docs     { proxy_pass http://backend:8083/v3/api-docs; }

    # Actuator: only health/info publicly; metrics/prometheus restricted to internal Docker networks.
    # Prevents accidental public exposure of Prometheus metrics (QA-M14).
    location = /actuator/health { proxy_pass http://backend:8083/actuator/health; }
    location = /actuator/info   { proxy_pass http://backend:8083/actuator/info; }
    location /actuator/ {
        # Docker default bridge ranges; adjust per your VPC/ECS setup
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://backend:8083/actuator/;
    }

    # Static asset cache (7 days, immutable)
    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
