spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  # PRR-016: transit_encryption_enabled=true on the managed Redis requires the
  # Lettuce client to negotiate TLS; otherwise the server drops the plaintext socket.
  data:
    redis:
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

logging:
  level:
    root: INFO
    com.humanad.makit: INFO

jwt:
  # MUST be provided via env (from ECS secrets / Secrets Manager). App fails fast if < 32 chars under prod profile.
  secret: ${JWT_SECRET}

# Prod nested Bedrock config (env-driven); defaults kept sane.
aws:
  region: ${AWS_REGION:ap-northeast-2}
  bedrock:
    enabled: ${BEDROCK_ENABLED:true}
    region: ${BEDROCK_REGION:${AWS_REGION:ap-northeast-2}}
    models:
      claudeHaiku:     ${BEDROCK_TEXT_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}
      claudeSonnet:    anthropic.claude-3-5-sonnet-20240620-v1:0
      titanEmbed:      amazon.titan-embed-text-v2:0
      stableDiffusion: ${BEDROCK_IMAGE_MODEL_ID:stability.stable-diffusion-xl-v1}
      titanImage:      amazon.titan-image-generator-v1
    s3:
      bucket:      ${S3_BUCKET:makit-assets}
      assetPrefix: generated/
      enabled:     ${AWS_S3_ENABLED:true}

# Server-side rate limit (defense-in-depth; nginx/gateway has the primary limit).
security:
  rate-limit:
    auth:
      capacity: ${AUTH_RATE_LIMIT_CAPACITY:10}
      refill-period: ${AUTH_RATE_LIMIT_PERIOD:PT1M}

# Actuator hardening (QA ops):
# - expose only what operators / ECS probes need
# - hide health detail by default
# - enable k8s/ECS liveness & readiness probes
# - /actuator/prometheus is additionally protected at the nginx/ALB layer
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: makit-backend
