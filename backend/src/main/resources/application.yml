server:
  port: 8083
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: makit
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/makit}
    username: ${SPRING_DATASOURCE_USERNAME:makit_user}
    password: ${SPRING_DATASOURCE_PASSWORD:makit_pwd}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 3000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    # V202604201208__seed_demo_user.sql was replaced by DemoUserSeeder (runtime BCrypt).
    # Allow existing DBs that applied the old migration to keep that row in flyway_schema_history
    # without failing validation.
    ignore-migration-patterns: "*:missing"
  threads:
    virtual:
      enabled: true
  cache:
    type: redis
  data:
    redis:
      host: ${SPRING_REDIS_HOST:${REDIS_HOST:localhost}}
      port: ${SPRING_REDIS_PORT:${REDIS_PORT:6379}}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:}
  access-token-ttl: PT15M
  refresh-token-ttl: P7D
  issuer: ${JWT_ISSUER:https://makit.example.com}
  audience: ${JWT_AUDIENCE:makit-web}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  bedrock:
    # Flip to false (or set profile=mock) to activate MockBedrockService.
    enabled: ${BEDROCK_ENABLED:${AI_BEDROCK_ENABLED:true}}
    region: ${BEDROCK_REGION:${AWS_REGION:ap-northeast-2}}
    models:
      claudeHaiku:     ${BEDROCK_TEXT_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}
      claudeSonnet:    anthropic.claude-3-5-sonnet-20240620-v1:0
      titanEmbed:      amazon.titan-embed-text-v2:0
      stableDiffusion: ${BEDROCK_IMAGE_MODEL_ID:stability.stable-diffusion-xl-v1}
      titanImage:      amazon.titan-image-generator-v1
    defaults:
      maxTokensText:       1024
      maxTokensAnalysis:   4096
      temperature:         0.3
      temperatureAnalysis: 0.1
      imageSteps:          40
      imageCfgScale:       7.5
    rag:
      chunkSize:    1000
      chunkOverlap: 200
      # Operator-driven prompt variant overrides. Key: unversioned prompt path
      # (under resources/prompts/). Value: variant suffix (e.g. "v2") or "latest".
      # Empty map means every prompt resolves to its default (latest) file.
      promptVariants: {}
    # Tier-2 / Tier-3 fallback cascade for invokeText.
    fallback:
      # Secondary model tried when the primary exhausts retries (leave blank to skip).
      textModel: ${BEDROCK_FALLBACK_TEXT_MODEL:amazon.titan-text-express-v1}
      cannedText: "AI 일시 장애 — 잠시 후 다시 시도하세요"
    # USD per 1K tokens. Source: AWS Bedrock pricing 2026-04. Tune as prices change.
    tariff:
      anthropic.claude-3-haiku-20240307-v1:0:
        inputPer1k:  0.00025
        outputPer1k: 0.00125
      anthropic.claude-3-5-sonnet-20240620-v1:0:
        inputPer1k:  0.003
        outputPer1k: 0.015
      amazon.titan-embed-text-v2:0:
        inputPer1k:  0.00002
        outputPer1k: 0.0
      stability.stable-diffusion-xl-v1:
        inputPer1k:  0.0
        outputPer1k: 0.0
      amazon.titan-image-generator-v1:
        inputPer1k:  0.0
        outputPer1k: 0.0
    s3:
      bucket:      ${S3_BUCKET:${MAKIT_ASSETS_BUCKET:makit-assets-dev}}
      assetPrefix: generated/

resilience4j:
  circuitbreaker:
    instances:
      bedrock:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 20s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      bedrock:
        max-attempts: 2
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - software.amazon.awssdk.services.bedrockruntime.model.ModelTimeoutException
          - software.amazon.awssdk.services.bedrockruntime.model.ThrottlingException
          - software.amazon.awssdk.core.exception.SdkClientException
  ratelimiter:
    instances:
      bedrock:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 2s

makit:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173}
  ai:
    # AI 답변 품질 대시보드(/api/admin/ai/quality) 경고 배너 임계치.
    # 운영 중 트래픽 패턴이 바뀌면 환경변수(MAKIT_AI_QUALITY_*) 로 재배포 없이 조정한다.
    quality:
      helpfulRateThreshold:    ${MAKIT_AI_QUALITY_HELPFUL_RATE_THRESHOLD:0.70}
      latencyMeanAlertMs:      ${MAKIT_AI_QUALITY_LATENCY_MEAN_ALERT_MS:6000}
      latencyP95AlertMs:       ${MAKIT_AI_QUALITY_LATENCY_P95_ALERT_MS:10000}
      minSamplesForRateAlert:  ${MAKIT_AI_QUALITY_MIN_SAMPLES_FOR_RATE_ALERT:5}
      # 컬렉션·액션마다 데이터 크기/복잡도가 달라 합당한 p95도 다르다. 코드 수정 없이
      # 노이즈 없는 경보만 받도록 태그별 오버라이드를 둔다. 키가 없으면 위의
      # latencyP95AlertMs(전역 기본값)가 그대로 적용된다.
      # YAML 예:
      #   askP95AlertMsByCollection:
      #     office_hub: 15000
      #     small_faq:   4000
      #   actionP95AlertMsByAction:
      #     summarize:   8000
      # 환경변수 예 (Spring relaxed binding, 점/대시 없는 키만):
      #   MAKIT_AI_QUALITY_ASK_P95_ALERT_MS_BY_COLLECTION_OFFICE_HUB=15000
      #   MAKIT_AI_QUALITY_ACTION_P95_ALERT_MS_BY_ACTION_SUMMARIZE=8000
      askP95AlertMsByCollection: {}
      actionP95AlertMsByAction:  {}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: makit-backend
    distribution:
      percentiles-histogram:
        bedrock.invoke: true
        http.server.requests: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.humanad.makit: DEBUG
    com.humanad.makit.ai: INFO
    software.amazon.awssdk: WARN
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] %logger{36} - %msg%n"
