spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/makit}
    username: ${SPRING_DATASOURCE_USERNAME:makit_user}
    password: ${SPRING_DATASOURCE_PASSWORD:makit_pwd}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
  jpa:
    hibernate:
      ddl-auto: validate

# Ensure nested Bedrock config binds correctly in docker profile.
aws:
  region: ${AWS_REGION:ap-northeast-2}
  bedrock:
    enabled: ${BEDROCK_ENABLED:${AI_BEDROCK_ENABLED:true}}
    region: ${BEDROCK_REGION:${AWS_REGION:ap-northeast-2}}
    models:
      claudeHaiku:     ${BEDROCK_TEXT_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}
      claudeSonnet:    anthropic.claude-3-5-sonnet-20240620-v1:0
      titanEmbed:      amazon.titan-embed-text-v2:0
      stableDiffusion: ${BEDROCK_IMAGE_MODEL_ID:stability.stable-diffusion-xl-v1}
      titanImage:      amazon.titan-image-generator-v1
    s3:
      bucket:      ${S3_BUCKET:makit-assets-dev}
      assetPrefix: generated/
